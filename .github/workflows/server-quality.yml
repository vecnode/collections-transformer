name: Server Quality

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install quality tooling
        run: pip install ruff pytest

      - name: Ruff
        run: ruff check server/app.py server/config.py server/api/__init__.py server/api/provider_openai.py server/api/provider_ollama.py

      - name: Smoke tests
        run: pytest
