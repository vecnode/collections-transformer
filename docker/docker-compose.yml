services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      mongo-seed:
        condition: service_completed_successfully
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      API_PORT: "8080"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL_OPTION: ${OLLAMA_MODEL_OPTION:-gemma3:27b}
      BLIP2_MODEL_NAME: ${BLIP2_MODEL_NAME:-Salesforce/blip2-opt-2.7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: python -m app.worker
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      mongo-seed:
        condition: service_completed_successfully
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL_OPTION: ${OLLAMA_MODEL_OPTION:-gemma3:27b}
      BLIP2_MODEL_NAME: ${BLIP2_MODEL_NAME:-Salesforce/blip2-opt-2.7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - client
      - api
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-seed:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_started
    volumes:
      - ../server/db:/seed
      - ../scripts:/scripts:ro
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: tanc_database
      SEED_ARCHIVE: /seed/tanc_database.archive.gz
    command: ["bash", "/scripts/restore_mongo_seed.sh"]
    restart: "no"

volumes:
  redis_data:
  mongo_data:
  caddy_data:
  caddy_config:
