services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - mongodb
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      API_PORT: "8080"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: python -m app.worker
    depends_on:
      - redis
      - mongodb
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
