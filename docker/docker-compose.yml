services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      mongo-seed:
        condition: service_completed_successfully
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      API_PORT: "8080"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    command: python -m app.worker
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      mongo-seed:
        condition: service_completed_successfully
    volumes:
      - ../server/db:/app/server/db
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tanc_database
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_SERVER_URL: http://api:8080
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-seed:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_started
    volumes:
      - ../server/db:/seed
      - ../scripts:/scripts:ro
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: tanc_database
      SEED_ARCHIVE: /seed/tanc_database.archive.gz
    command: ["bash", "/scripts/restore_mongo_seed.sh"]
    restart: "no"

volumes:
  redis_data:
  mongo_data:
